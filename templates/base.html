<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_name }} - {{ site_tagline }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Latest Government Jobs, Results, Admit Cards and Syllabus updates.{% endblock %}">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --dark-bg: #121212;
            --dark-card: #1e1e1e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            transition: background-color 0.3s, color 0.3s;
        }
        [data-bs-theme="dark"] body {
            background-color: var(--dark-bg);
            color: #e0e0e0;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.08);
            backdrop-filter: blur(10px);
        }
        .card {
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,.05);
            transition: transform 0.2s, box-shadow 0.2s;
            background-color: white;
        }
        [data-bs-theme="dark"] .card {
            background-color: var(--dark-card);
            color: #e0e0e0;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,.1);
        }
        .btn-primary {
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 500;
        }
        .scroll-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        /* Tables */
        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        [data-bs-theme="dark"] .table-custom {
            background: var(--dark-card);
        }
        .table-custom th {
            background-color: #f1f3f5;
            border: none;
        }
        [data-bs-theme="dark"] .table-custom th {
            background-color: #2a2a2a;
            color: #fff;
        }
        .table-custom td {
            vertical-align: middle;
        }
        /* Ticker */
        .ticker-container {
            background: #0d6efd;
            color: white;
            padding: 5px 0;
            overflow: hidden;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include 'includes/ticker.html' %}
    {% include 'includes/navbar.html' %}

    <main class="py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    {% include 'includes/footer.html' %}

    <button id="scrollToTop" class="btn btn-primary rounded-circle scroll-to-top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Dark Mode Toggle Logic
        const getStoredTheme = () => localStorage.getItem('theme');
        const setStoredTheme = theme => localStorage.setItem('theme', theme);
        const getPreferredTheme = () => {
            const storedTheme = getStoredTheme();
            if (storedTheme) return storedTheme;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        const setTheme = theme => {
            if (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-bs-theme', theme);
            }
        };

        setTheme(getPreferredTheme());

        window.addEventListener('DOMContentLoaded', () => {
            const themeBtn = document.getElementById('themeToggle');
            if (themeBtn) {
                themeBtn.addEventListener('click', () => {
                    const currentTheme = document.documentElement.getAttribute('data-bs-theme');
                    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                    setTheme(newTheme);
                    setStoredTheme(newTheme);
                });
            }
        });

        // Scroll to Top
        const scrollBtn = document.getElementById('scrollToTop');
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollBtn.style.display = 'block';
            } else {
                scrollBtn.style.display = 'none';
            }
        });
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
