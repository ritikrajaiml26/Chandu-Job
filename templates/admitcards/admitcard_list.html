{% extends 'base.html' %}
{% block title %}Latest Admit Cards - {{ site_name }}{% endblock %}
{% block content %}
<h2 class="mb-4">Latest Admit Cards</h2>
<div class="table-responsive">
    <table class="table table-custom table-hover border">
        <thead class="table-light">
            <tr>
                <th>Exam Name</th>
                <th>Published At</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for card in admitcards %}
            <tr>
                <td class="fw-500">{{ card.title }}</td>
                <td>{{ card.published_at|date:"d M Y" }}</td>
                <td><a href="{% url 'admitcards:admitcard_detail' card.slug %}" class="btn btn-outline-warning btn-sm">Download Card</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
