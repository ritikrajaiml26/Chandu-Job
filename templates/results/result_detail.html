{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm border-0 p-4">
    <h2 class="fw-bold text-success mb-3">{{ result.title }}</h2>
    <p class="text-muted mb-4">Published on: {{ result.published_at|date:"d M Y" }}</p>
    <div class="mb-4">{{ result.description|linebreaks }}</div>
    <div class="d-grid gap-2">
        <a href="{{ result.result_link }}" target="_blank" class="btn btn-success btn-lg">Download Result / Check Online</a>
        {% if result.pdf %}<a href="{{ result.pdf.url }}" target="_blank" class="btn btn-outline-danger">Download Official PDF</a>{% endif %}
    </div>
</div>
{% endblock %}
