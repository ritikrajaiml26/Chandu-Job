{% extends "admin/change_form.html" %}
{% load i18n static %}

{% block extrahead %}
{{ block.super }}
<style>
/* ============================================================
   JOB FORM — PREMIUM FULL-WIDTH LAYOUT
   Every field gets maximum space
============================================================ */

/* Force content to be truly full-width */
#content       { padding: 28px 36px !important; }
#content-main  { width: 100% !important; float: none !important; }
.change-form   { width: 100% !important; }

/* Remove Django's floating layout */
.form-row::after { content: none !important; }
.form-row::before { content: none !important; }

/* ── Fieldset / section card ── */
fieldset.module {
    background: #0d0b22 !important;
    border: 1px solid rgba(139,92,246,0.16) !important;
    border-radius: 18px !important;
    overflow: hidden !important;
    margin-bottom: 28px !important;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35) !important;
}

fieldset.module h2 {
    background: rgba(124,58,237,0.10) !important;
    border-bottom: 1px solid rgba(139,92,246,0.14) !important;
    padding: 18px 32px !important;
    font-size: 0.85rem !important;
    font-weight: 800 !important;
    letter-spacing: 0.04em !important;
    text-transform: uppercase !important;
    color: #a78bfa !important;
    display: flex !important;
    align-items: center !important;
    gap: 10px !important;
}

/* ── Every form-row = full block, label on top ── */
fieldset .form-row {
    display: block !important;
    padding: 24px 32px !important;
    border-bottom: 1px solid rgba(139,92,246,0.07) !important;
    background: transparent !important;
    width: 100% !important;
    box-sizing: border-box !important;
}
fieldset .form-row:last-child { border-bottom: none !important; }

/* Alternate row tinting */
fieldset .form-row:nth-child(even) {
    background: rgba(255,255,255,0.015) !important;
}

/* ── Labels ── */
fieldset .form-row label,
fieldset .form-row > div > label {
    display: block !important;
    font-size: 0.78rem !important;
    font-weight: 800 !important;
    text-transform: uppercase !important;
    letter-spacing: 0.08em !important;
    color: #64748b !important;
    margin-bottom: 10px !important;
    float: none !important;
    width: auto !important;
    padding-top: 0 !important;
}

/* ── div.field-box wrapper ── */
fieldset .form-row .field-box,
fieldset .form-row > div {
    float: none !important;
    width: 100% !important;
    clear: both !important;
    display: block !important;
}

/* ── ALL inputs full-width ── */
fieldset .form-row input[type=text],
fieldset .form-row input[type=password],
fieldset .form-row input[type=email],
fieldset .form-row input[type=url],
fieldset .form-row input[type=number],
fieldset .form-row input[type=date],
fieldset .form-row input[type=file],
fieldset .form-row select {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    padding: 13px 18px !important;
    font-size: 1rem !important;
    line-height: 1.5 !important;
    background: rgba(6,5,20,0.85) !important;
    border: 1px solid rgba(139,92,246,0.22) !important;
    border-radius: 12px !important;
    color: #f1f5f9 !important;
    font-family: 'Inter', sans-serif !important;
    box-sizing: border-box !important;
    transition: border-color 0.2s, box-shadow 0.2s !important;
    float: none !important;
}

/* ── Textareas — big and spacious ── */
fieldset .form-row textarea,
fieldset .form-row .vLargeTextField {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important;
    padding: 16px 20px !important;
    font-size: 1rem !important;
    line-height: 1.75 !important;
    background: rgba(6,5,20,0.85) !important;
    border: 1px solid rgba(139,92,246,0.22) !important;
    border-radius: 12px !important;
    color: #f1f5f9 !important;
    font-family: 'Inter', sans-serif !important;
    box-sizing: border-box !important;
    resize: vertical !important;
    min-height: 140px !important;
    transition: border-color 0.2s, box-shadow 0.2s !important;
    float: none !important;
    clear: both !important;
}

/* Focus glow */
fieldset .form-row input:focus,
fieldset .form-row select:focus,
fieldset .form-row textarea:focus {
    border-color: #a78bfa !important;
    box-shadow: 0 0 0 4px rgba(139,92,246,0.15), 0 2px 12px rgba(124,58,237,0.2) !important;
    background: rgba(10,8,30,0.98) !important;
    outline: none !important;
}

/* Specific field heights */
fieldset .form-row textarea[name="full_description"]  { min-height: 360px !important; }
fieldset .form-row textarea[name="eligibility"]       { min-height: 280px !important; }
fieldset .form-row textarea[name="important_dates"]   { min-height: 280px !important; }
fieldset .form-row textarea[name="selection_process"] { min-height: 240px !important; }
fieldset .form-row textarea[name="how_to_apply"]      { min-height: 240px !important; }
fieldset .form-row textarea[name="short_description"] { min-height: 120px !important; }

/* ── Help text ── */
fieldset .form-row .help,
fieldset .form-row p.help {
    font-size: 0.78rem !important;
    color: #334155 !important;
    margin-top: 8px !important;
    line-height: 1.5 !important;
    display: block !important;
    clear: both !important;
}

/* ── Two-column grid for short fields ── */
.two-col-grid {
    display: grid !important;
    grid-template-columns: 1fr 1fr !important;
    gap: 0 !important;
}
.two-col-grid .form-row {
    padding: 22px 28px !important;
}

/* ── Submit row ── */
.submit-row {
    background: rgba(6,5,20,0.9) !important;
    border: 1px solid rgba(139,92,246,0.14) !important;
    border-radius: 16px !important;
    padding: 20px 32px !important;
    display: flex !important;
    align-items: center !important;
    gap: 14px !important;
    margin-top: 4px !important;
    flex-wrap: wrap !important;
}

.submit-row input[type=submit] {
    padding: 12px 28px !important;
    font-size: 0.9rem !important;
    border-radius: 11px !important;
}

/* ── Object tools ── */
.object-tools { margin-bottom: 22px !important; }

/* ── Page title ── */
#content h1 {
    font-size: 1.5rem !important;
    font-weight: 800 !important;
    color: #f1f5f9 !important;
    letter-spacing: -0.03em !important;
    margin-bottom: 24px !important;
}

/* ── Breadcrumbs tighter ── */
.breadcrumbs {
    padding: 11px 36px !important;
}

/* ── Boolean checkbox row ── */
fieldset .form-row .checkbox-row,
fieldset .form-row input[type=checkbox] {
    width: auto !important;
    display: inline-block !important;
    margin-right: 8px !important;
}

/* ── File upload ── */
fieldset .form-row .file-upload {
    color: #94a3b8 !important;
    font-size: 0.85rem !important;
}

/* ── Clearable file input ── */
.clearable-file-input { color: #94a3b8 !important; font-size: 0.84rem !important; }
.clearable-file-input a { color: #a78bfa !important; }

/* ── Select2 / related widget ── */
.related-widget-wrapper { width: 100% !important; display: block !important; }
.related-widget-wrapper select { width: 100% !important; }

/* Animate form in */
@keyframes formSlide { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
fieldset.module { animation: formSlide 0.35s ease both; }
fieldset.module:nth-child(2) { animation-delay: 0.06s; }
fieldset.module:nth-child(3) { animation-delay: 0.12s; }
fieldset.module:nth-child(4) { animation-delay: 0.18s; }
</style>
{% endblock %}
